<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>중간고사 단어 수업</title>
  <style>
    :root {
      --bg: #f6efe4;
      --bg-deep: #eadbc5;
      --ink: #1d1a16;
      --muted: #6f675c;
      --card: rgba(255, 250, 243, 0.88);
      --line: rgba(44, 36, 24, 0.1);
      --brand: #b55233;
      --brand-2: #2f6c63;
      --accent: #d9902b;
      --ok: #2f7d57;
      --wrong: #b63a3a;
      --shadow: 0 18px 40px rgba(62, 45, 18, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body, button, a, div, p, h1, h2, h3, span, strong, li {
      word-break: keep-all;
      overflow-wrap: normal;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(217, 144, 43, 0.18), transparent 34%),
        linear-gradient(180deg, #f4e6cf 0%, var(--bg) 30%, #f3ede7 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 12px 28px;
    }

    .phone {
      width: min(100%, 430px);
      min-height: calc(100vh - 36px);
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.92), rgba(255, 248, 238, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 36px;
      box-shadow: 0 28px 80px rgba(73, 49, 19, 0.2);
      overflow: hidden;
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 24px;
      border-radius: 99px;
      background: rgba(50, 40, 30, 0.08);
      z-index: 2;
    }

    .app {
      padding: 38px 14px 22px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero {
      padding: 18px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(181, 82, 51, 0.96), rgba(217, 144, 43, 0.9));
      color: white;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -24px;
      top: -18px;
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    .home-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 18px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: white;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 18px rgba(90, 40, 15, 0.16);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.84;
      margin-bottom: 8px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .hero h1 {
      font-size: 26px;
      line-height: 1.2;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      position: relative;
      z-index: 1;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.92;
    }

    .chips,
    .segment {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar,
    .segment::-webkit-scrollbar {
      display: none;
    }

    .chip,
    .segment button,
    .action {
      border: 0;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.2s ease, color 0.2s ease;
    }

    .chip {
      flex: 1 1 0;
      padding: 12px 8px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      color: var(--muted);
      border: 1px solid var(--line);
      text-align: center;
      min-width: 0;
    }

    .chip strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 0;
    }

    .chip.active {
      background: #fff2e2;
      color: var(--brand);
      border-color: rgba(181, 82, 51, 0.25);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(181, 82, 51, 0.12);
    }

    .segment {
      background: rgba(255, 255, 255, 0.65);
      padding: 6px;
      border-radius: 20px;
      border: 1px solid var(--line);
    }

    .segment button {
      flex: 1 0 0;
      padding: 12px 10px;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .segment button.active {
      background: linear-gradient(135deg, var(--brand-2), #4d8c82);
      color: white;
      box-shadow: 0 10px 24px rgba(47, 108, 99, 0.22);
    }

    .flashcard {
      position: relative;
      min-height: 170px;
      perspective: 1200px;
      margin-top: 8px;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      min-height: 170px;
      transition: transform 0.55s ease;
      transform-style: preserve-3d;
    }

    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .flashcard-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 22px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,247,237,0.96));
      border: 1px solid rgba(44, 36, 24, 0.07);
    }

    .flashcard-back {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, rgba(47,108,99,0.12), rgba(255,255,255,0.95));
    }

    .flashcard-word {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--brand);
    }

    .flashcard-sub {
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    .flashcard-meta {
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink);
    }

    .flash-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .flash-btn {
      flex: 1;
      padding: 12px 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      color: var(--brand-2);
      font-weight: 700;
      cursor: pointer;
    }

    .panel {
      display: none;
      flex-direction: column;
      gap: 14px;
      animation: rise 0.22s ease;
    }

    .panel.active {
      display: flex;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .card h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .bonus-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .wordbook-group {
      margin-bottom: 18px;
    }

    .wordbook-group:last-child {
      margin-bottom: 0;
    }

    .wordbook-group h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: var(--brand);
    }

    .wordbook-item {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .wordbook-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .wordbook-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .wordbook-toggle {
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .wordbook-head strong {
      font-size: 15px;
    }

    .wordbook-head span {
      font-size: 12px;
      color: var(--muted);
    }

    .wordbook-item .bonus-meaning {
      display: none;
    }

    .wordbook-item.open .bonus-meaning {
      display: block;
    }

    .bonus-item {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .bonus-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .bonus-word {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--brand);
    }

    .bonus-meaning {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .bonus-memo {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .jump-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .jump-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 12px 10px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      color: var(--brand-2);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
    }

    .tag {
      font-size: 11px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(47, 108, 99, 0.1);
      color: var(--brand-2);
      border: 1px solid rgba(47, 108, 99, 0.12);
    }

    .step {
      padding: 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,247,237,0.92));
      border: 1px solid rgba(44, 36, 24, 0.07);
      margin-bottom: 10px;
    }

    .step:last-child {
      margin-bottom: 0;
    }

    .step-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: rgba(181, 82, 51, 0.12);
      color: var(--brand);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .step h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .step ul {
      margin: 0;
      padding-left: 18px;
      color: var(--ink);
      line-height: 1.55;
      font-size: 14px;
    }

    .step .focus {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(217, 144, 43, 0.12);
      color: #7a4d0c;
      font-size: 13px;
      font-weight: 700;
    }

    .vocab-group {
      margin-bottom: 14px;
    }

    .vocab-group:last-child {
      margin-bottom: 0;
    }

    .vocab-group h3 {
      font-size: 15px;
      margin-bottom: 10px;
      color: var(--brand);
    }

    .vocab-item {
      border-top: 1px solid var(--line);
      padding: 12px 0;
    }

    .vocab-item:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .word {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .word strong {
      font-size: 16px;
    }

    .word span {
      font-size: 12px;
      color: var(--muted);
    }

    .meaning {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .memo {
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .sentence {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(44, 36, 24, 0.06);
      margin-bottom: 10px;
    }

    .sentence:last-child {
      margin-bottom: 0;
    }

    .sentence-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    .sentence-head strong {
      color: var(--brand);
      font-size: 13px;
    }

    .toggle-korean {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(47, 108, 99, 0.1);
      color: var(--brand-2);
    }

    .english {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .korean {
      display: none;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }

    .sentence.show .korean {
      display: block;
    }

    .section-anchor {
      scroll-margin-top: 18px;
    }

    .top-wrap {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .top-btn {
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.84);
      color: var(--brand-2);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .score-pill {
      font-size: 12px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--brand), #d27b1d);
      padding: 9px 12px;
      border-radius: 999px;
    }

    .quiz-item {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(44, 36, 24, 0.06);
      margin-bottom: 10px;
    }

    .quiz-item:last-child {
      margin-bottom: 0;
    }

    .quiz-item h3 {
      font-size: 15px;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .quiz-item .question-type {
      font-size: 11px;
      color: var(--brand-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    .option {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
      border-radius: 14px;
      padding: 12px 12px;
      text-align: left;
      font-size: 14px;
      color: var(--ink);
    }

    .option.selected {
      border-color: rgba(47, 108, 99, 0.3);
      background: rgba(47, 108, 99, 0.12);
    }

    .option.correct {
      border-color: rgba(47, 125, 87, 0.28);
      background: rgba(47, 125, 87, 0.12);
      color: var(--ok);
    }

    .option.wrong {
      border-color: rgba(182, 58, 58, 0.28);
      background: rgba(182, 58, 58, 0.12);
      color: var(--wrong);
    }

    .result {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      display: none;
    }

    .result.show {
      display: block;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      padding-top: 4px;
      background: linear-gradient(180deg, rgba(246,239,228,0), rgba(246,239,228,0.95) 22%);
    }

    .action {
      flex: 1 1 0;
      padding: 15px 12px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 14px;
    }

    .action:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
    }

    .action.primary {
      background: linear-gradient(135deg, var(--brand), #db8a25);
      color: white;
      box-shadow: 0 14px 28px rgba(181, 82, 51, 0.22);
    }

    .action.secondary {
      background: rgba(255,255,255,0.85);
      color: var(--brand-2);
      border: 1px solid var(--line);
    }

    .footer-space {
      height: 10px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="app">
      <section class="hero">
        <a class="home-btn" href="../../../index.html" aria-label="홈으로">⌂</a>
        <div class="eyebrow">Midterm English</div>
        <h1 id="hero-title">1회차 경제</h1>
        <p id="hero-desc">쉬운 단어에서 시험 단어로 올라가면서, 수업과 퀴즈를 나눠서 공부하는 학습지.</p>
      </section>

      <nav class="chips" id="lesson-tabs"></nav>

      <div class="segment">
        <button class="active" data-panel="lesson">수업</button>
        <button data-panel="quiz">퀴즈</button>
      </div>

      <section class="panel active" id="lesson-panel"></section>
      <section class="panel" id="quiz-panel"></section>
      <div class="footer-space"></div>
    </div>
  </div>

  <script>
    const lessons = [
      {
        id: "lesson1",
        short: "1회차",
        title: "경제",
        hero: "욕구 -> 선택 -> 비용 -> 결과 구조로 경제 지문 읽기",
        targets: ["04-Analysis", "05-Analysis", "05-연습 04", "07-연습 03"],
        steps: [
          {
            title: "want에서 desire로",
            bullets: [
              "want / need에서 출발해 더 강한 마음인 desire로 올라간다.",
              "좋아 보이는 수준을 넘어 valuable이라는 평가로 이동한다.",
              "사고 싶은 마음과 살 수 있는 능력 afford를 연결한다.",
              "여러 선택지 중 무엇이 더 나은지 preferable로 비교한다."
            ],
            focus: "desire, valuable, afford, preferable"
          },
          {
            title: "get에서 purchase로",
            bullets: [
              "단순히 얻는 것이 아니라 purchase라는 경제 행동으로 읽는다.",
              "have를 possess로 끌어올려 지문 표현에 익숙해진다.",
              "그 행동을 가능하게 하는 수단을 means로 연결한다."
            ],
            focus: "purchase, possess, means"
          },
          {
            title: "price에서 consequence로",
            bullets: [
              "비용은 단순한 price가 아니라 burden과 monetary pressure로 확장된다.",
              "경제 선택은 항상 consequence를 남긴다.",
              "그 결과가 클수록 costly하다는 말이 붙는다."
            ],
            focus: "burden, monetary, consequence, costly"
          },
          {
            title: "work에서 시스템으로",
            bullets: [
              "wage를 통해 경제 활동의 기본 구조를 잡는다.",
              "innovation, device, virtual 같은 변화 단어를 읽는다.",
              "장단점을 비교하는 문장에서는 outweigh를 찾는다.",
              "선택의 분명한 목표는 objective로 읽는다."
            ],
            focus: "wage, innovation, device, outweigh, objective"
          }
        ],
        vocabGroups: [
          {
            title: "욕구와 선택",
            items: [
              ["Desire", "욕망, 욕구", "want보다 더 강한 마음", "Step 1"],
              ["Valuable", "가치 있는", "good보다 값어치가 강조됨", "Step 1"],
              ["Afford", "살 여유가 있다", "돈과 구매 능력 연결", "Step 1"],
              ["Preferable", "더 바람직한", "두 선택 중 더 좋은 쪽", "Step 1-2"],
              ["Means", "수단, 방법", "어떤 결과에 이르는 방식", "Step 2"]
            ]
          },
          {
            title: "구매와 소유",
            items: [
              ["Purchase", "구매하다, 구매", "buy보다 시험형 표현", "Step 2"],
              ["Possess", "소유하다", "have의 격식형", "Step 2"],
              ["Candidate", "후보, 대상", "선택되는 대상", "Step 2"],
              ["Capacity", "능력, 수용력", "감당하거나 살 수 있는 능력", "Step 2"],
              ["Objective", "목적, 객관적인", "선택의 목표와 연결", "Step 4"]
            ]
          },
          {
            title: "비용과 부담",
            items: [
              ["Burden", "부담", "돈, 책임, 의무가 무거운 상태", "Step 3"],
              ["Monetary", "금전의", "money 관련 표현", "Step 3"],

    function buildWordbookEntries() {
      const seen = new Map();
      lessons.forEach((lesson, lessonIndex) => {
        lesson.vocabGroups.forEach(group => {
          group.items.forEach(item => {
            const key = item[0].toLowerCase();
            if (!seen.has(key)) {
              seen.set(key, {
                word: item[0],
                meaning: item[1],
                memo: item[2],
                source: `${lesson.short} · 핵심`
              });
            }
          });
        });

        lesson.bonus.forEach(item => {
          const key = item[0].toLowerCase();
          if (!seen.has(key)) {
            seen.set(key, {
              word: item[0],
              meaning: item[1],
              memo: item[2],
              source: `${lesson.short} · 보너스`
            });
          }
        });
      });
      return Array.from(seen.values()).sort((a, b) => a.word.localeCompare(b.word));
    }

      if (currentLessonIndex === WORDBOOK_INDEX) {
        renderWordbookPanel();
        return;
      }
      const lesson = lessons[currentLessonIndex];
      heroTitle.textContent = `${lesson.short} ${lesson.title}`;
      heroDesc.textContent = lesson.hero;

      lessonPanel.innerHTML = `
        <section class="card section-anchor" id="jump">
          <h2>바로 이동</h2>
          <p class="sub">보고 싶은 영역으로 바로 이동해서 공부하면 된다.</p>
          <div class="jump-grid">
            <button class="jump-btn" data-jump="flashcards">단어 카드</button>
            <button class="jump-btn" data-jump="core-vocab">핵심 단어</button>
            <button class="jump-btn" data-jump="mechanism">단어 확장 메커니즘</button>
            <button class="jump-btn" data-jump="bonus">보너스 단어</button>
            <button class="jump-btn" data-jump="reading">독해</button>
            <button class="jump-btn" data-jump-panel="quiz">퀴즈</button>
          </div>
        </section>
        <section class="card section-anchor" id="flashcards">
          <h2>단어 카드</h2>
          <p class="sub">카드를 눌러 뜻과 메모를 확인하고, 이전/다음으로 넘기면서 반복한다.</p>
          <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
              <div class="flashcard-face flashcard-front">
                <div class="flashcard-word" id="flash-word"></div>
                <div class="flashcard-sub" id="flash-step"></div>
              </div>
              <div class="flashcard-face flashcard-back">
                <div class="flashcard-word" id="flash-meaning"></div>
                <div class="flashcard-meta" id="flash-memo"></div>
              </div>
            </div>
          </div>
          <div class="flash-actions">
            <button class="flash-btn" id="flash-prev">이전</button>
            <button class="flash-btn" id="flash-flip">뒤집기</button>
            <button class="flash-btn" id="flash-next">다음</button>
          </div>
          <div class="top-wrap">
            <button class="top-btn" data-jump="jump">맨 위로 (Top)</button>
          </div>
        </section>
        <section class="card section-anchor" id="core-vocab">
          <h2>핵심 단어</h2>
          <p class="sub">이번 회차 핵심 단어 20개를 4묶음으로 나눠서 익힌다.</p>
          ${lesson.vocabGroups.map(group => `
            <div class="vocab-group">
              <h3>${group.title}</h3>
              ${group.items.map(item => `
                <div class="vocab-item">
                  <div class="word">
                    <strong>${item[0]}</strong>
                    <span>${item[3]}</span>
                  </div>
                  <div class="meaning">${item[1]}</div>
                  <div class="memo">${item[2]}</div>
                </div>
              `).join("")}
            </div>
          `).join("")}
          <div class="top-wrap">
            <button class="top-btn" data-jump="jump">맨 위로 (Top)</button>
          </div>
        </section>
        <section class="card section-anchor" id="mechanism">
          <h2>단어 확장 메커니즘</h2>
          ${lesson.steps.map((step, idx) => `
            <article class="step">
              <div class="step-index">${idx + 1}</div>
              <h3>${step.title}</h3>
              <ul>${step.bullets.map(line => `<li>${line}</li>`).join("")}</ul>
              <div class="focus">핵심 단어: ${step.focus}</div>
            </article>
          `).join("")}
          <div class="top-wrap">
            <button class="top-btn" data-jump="jump">맨 위로 (Top)</button>
          </div>
        </section>
        <section class="card section-anchor" id="bonus">
          <h2>보너스 단어 5개</h2>
          <div class="bonus-list">
            ${lesson.bonus.map(item => `
              <div class="bonus-item">
                <div class="bonus-word">${item[0]}</div>
                <div class="bonus-meaning">${item[1]}</div>
                <div class="bonus-memo">${item[2]}</div>
              </div>
            `).join("")}
          </div>
          <div class="top-wrap">
            <button class="top-btn" data-jump="jump">맨 위로 (Top)</button>
          </div>
        </section>
        <section class="card section-anchor" id="reading">
          <h2>독해 10문장</h2>
          <p class="sub">영어 문장을 먼저 읽고 뜻을 생각한 뒤, 필요할 때만 해석을 확인한다.</p>
          ${lesson.sentences.map((sentence, idx) => `
            <article class="sentence" data-sentence="${idx}">
              <div class="sentence-head">
                <strong>${String(idx + 1).padStart(2, "0")} · ${sentence[0]}</strong>
                <button class="toggle-korean">해석 보기</button>
              </div>
              <div class="english">${sentence[1]}</div>
              <div class="korean">${sentence[2]}</div>
            </article>
          `).join("")}
          <div class="top-wrap">
            <button class="top-btn" data-jump="jump">맨 위로 (Top)</button>
          </div>
        </section>
      `;
    }

    function getQuizKey() {
      if (currentLessonIndex === WORDBOOK_INDEX) return "wordbook";
      return lessons[currentLessonIndex].id;
    }

    function ensureQuizState() {
      if (currentLessonIndex === WORDBOOK_INDEX) {
        return {
          answers: [],
          checked: false,
          wrongIndexes: [],
          mode: "all"
        };
      }
      const key = getQuizKey();
      if (!quizSelections[key]) {
        quizSelections[key] = {
          answers: Array(lessons[currentLessonIndex].quiz.length).fill(null),
          checked: false,
          wrongIndexes: [],
          mode: "all"
        };
      }
      return quizSelections[key];
    }

    function ensureFlashState() {
      if (currentLessonIndex === WORDBOOK_INDEX) {
        return { index: 0, flipped: false };
      }
      const key = getQuizKey();
      if (!flashState[key]) {
        flashState[key] = { index: 0, flipped: false };
      }
      return flashState[key];
    }

    function getFlatVocab(lesson) {
      return lesson.vocabGroups.flatMap(group =>
        group.items.map(item => ({
          word: item[0],
          meaning: item[1],
          memo: item[2],
          step: item[3]
        }))
      );
    }

    function renderFlashcard() {
      if (currentLessonIndex === WORDBOOK_INDEX) return;
      const lesson = lessons[currentLessonIndex];
      const vocab = getFlatVocab(lesson);
      const state = ensureFlashState();
      const current = vocab[state.index];
      const card = document.getElementById("flashcard");
      if (!card || !current) return;
      card.classList.toggle("flipped", state.flipped);
      document.getElementById("flash-word").textContent = current.word;
      document.getElementById("flash-step").textContent = `${state.index + 1} / ${vocab.length} · ${current.step}`;
      document.getElementById("flash-meaning").textContent = current.meaning;
      document.getElementById("flash-memo").textContent = current.memo;
    }

    function renderQuizPanel() {
      if (currentLessonIndex === WORDBOOK_INDEX) {
        quizPanel.innerHTML = `
          <section class="card">
            <h2>단어장에서는 퀴즈가 없어요</h2>
            <p class="sub">위의 단어 목록을 보면서 전체 단어를 빠르게 복습하면 된다.</p>
          </section>
        `;
        return;
      }
      const lesson = lessons[currentLessonIndex];
      const state = ensureQuizState();
      const activeItems = state.mode === "wrongOnly" && state.wrongIndexes.length
        ? state.wrongIndexes.map(index => ({ ...lesson.quiz[index], originalIndex: index }))
        : lesson.quiz.map((item, index) => ({ ...item, originalIndex: index }));
      const answeredCount = activeItems.filter(item => state.answers[item.originalIndex] !== null).length;
      const score = state.checked
        ? activeItems.reduce((sum, item) => sum + (state.answers[item.originalIndex] === item.answer ? 1 : 0), 0)
        : null;

      quizPanel.innerHTML = `
        <section class="card">
          <div class="quiz-header">
            <div>
              <h2>Mini Test</h2>
              <p class="sub">단어 뜻 7문제, 문장 이해 3문제. 먼저 풀고 채점한 뒤, 틀린 문제만 다시 풀어 본다.</p>
            </div>
            <div class="score-pill">${state.checked ? `${score} / ${activeItems.length}` : `${answeredCount} / ${activeItems.length} 선택`}</div>
          </div>
        </section>
        <section class="card">
          ${activeItems.map((item, idx) => `
            <article class="quiz-item" data-q="${item.originalIndex}">
              <div class="question-type">${item.type} 문제 ${idx + 1}</div>
              <h3>${item.q}</h3>
              <div class="options">
                ${item.choices.map((choice, choiceIdx) => {
                  const selected = state.answers[item.originalIndex] === choiceIdx;
                  const isCorrect = item.answer === choiceIdx;
                  let extraClass = "";
                  if (state.checked && isCorrect) extraClass = "correct";
                  if (state.checked && selected && !isCorrect) extraClass = "wrong";
                  if (!state.checked && selected) extraClass = "selected";
                  return `<button class="option ${extraClass}" data-q="${item.originalIndex}" data-choice="${choiceIdx}">${choice}</button>`;
                }).join("")}
              </div>
              <div class="result ${state.checked ? "show" : ""}">
                정답: ${item.choices[item.answer]}<br>
                해설: ${item.explanation}
              </div>
            </article>
          `).join("")}
        </section>
        <div class="actions">
          <button class="action secondary" id="reset-quiz">다시 풀기</button>
          <button class="action secondary" id="retry-wrong" ${state.checked && state.wrongIndexes.length ? "" : "disabled"}>오답만 다시</button>
          <button class="action primary" id="check-quiz">${state.checked ? "채점 완료" : "채점하기"}</button>
        </div>
        <div class="top-wrap">
          <button class="top-btn" id="quiz-top">맨 위로 (Top)</button>
        </div>
      `;
    }

    function renderAll() {
      renderLessonTabs();
      renderLessonPanel();
      renderQuizPanel();
      renderFlashcard();
      segment.style.display = currentLessonIndex === WORDBOOK_INDEX ? "none" : "flex";
      document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
      document.getElementById(`${currentPanel}-panel`).classList.add("active");
      document.querySelectorAll(".segment button").forEach(button => {
        button.classList.toggle("active", button.dataset.panel === currentPanel);
      });
    }

    lessonTabs.addEventListener("click", (event) => {
      const button = event.target.closest(".chip");
      if (!button) return;
      currentLessonIndex = Number(button.dataset.index);
      renderAll();
    });

    document.querySelector(".segment").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      currentPanel = button.dataset.panel;
      renderAll();
    });

    lessonPanel.addEventListener("click", (event) => {
      const button = event.target.closest(".toggle-korean");
      if (button) {
        const sentence = button.closest(".sentence");
        sentence.classList.toggle("show");
        button.textContent = sentence.classList.contains("show") ? "해석 숨기기" : "해석 보기";
        return;
      }

      const wordbookToggle = event.target.closest(".wordbook-toggle");
      if (wordbookToggle) {
        wordbookToggle.closest(".wordbook-item").classList.toggle("open");
        return;
      }

      const flashcard = event.target.closest("#flashcard");
      const prev = event.target.closest("#flash-prev");
      const next = event.target.closest("#flash-next");
      const flip = event.target.closest("#flash-flip");
      const jumpButton = event.target.closest("[data-jump]");
      const jumpPanelButton = event.target.closest("[data-jump-panel]");
      const state = ensureFlashState();

      if (jumpPanelButton) {
        currentPanel = jumpPanelButton.dataset.jumpPanel;
        renderAll();
        return;
      }

      if (jumpButton) {
        const target = document.getElementById(jumpButton.dataset.jump);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
        return;
      }

      if (currentLessonIndex === WORDBOOK_INDEX) return;

      const vocab = getFlatVocab(lessons[currentLessonIndex]);

      if (flashcard || flip) {
        state.flipped = !state.flipped;
        renderFlashcard();
        return;
      }

      if (prev) {
        state.index = (state.index - 1 + vocab.length) % vocab.length;
        state.flipped = false;
        renderFlashcard();
        return;
      }

      if (next) {
        state.index = (state.index + 1) % vocab.length;
        state.flipped = false;
        renderFlashcard();
      }
    });

    quizPanel.addEventListener("click", (event) => {
      const option = event.target.closest(".option");
      const resetButton = event.target.closest("#reset-quiz");
      const checkButton = event.target.closest("#check-quiz");
      const retryWrongButton = event.target.closest("#retry-wrong");
      const quizTopButton = event.target.closest("#quiz-top");
      const state = ensureQuizState();
      const lesson = lessons[currentLessonIndex];

      if (quizTopButton) {
        quizPanel.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }

      if (option && !state.checked) {
        const qIndex = Number(option.dataset.q);
        const choiceIndex = Number(option.dataset.choice);
        state.answers[qIndex] = choiceIndex;
        renderQuizPanel();
        return;
      }

      if (checkButton && !state.checked) {
        state.checked = true;
        state.wrongIndexes = lesson.quiz
          .map((item, index) => ({ index, correct: state.answers[index] === item.answer }))
          .filter(item => !item.correct)
          .map(item => item.index);
        renderQuizPanel();
        return;
      }

      if (retryWrongButton && state.checked && state.wrongIndexes.length) {
        state.mode = "wrongOnly";
        state.checked = false;
        state.wrongIndexes.forEach(index => {
          state.answers[index] = null;
        });
        renderQuizPanel();
        return;
      }

      if (resetButton) {
        quizSelections[getQuizKey()] = {
          answers: Array(lesson.quiz.length).fill(null),
          checked: false,
          wrongIndexes: [],
          mode: "all"
        };
        renderQuizPanel();
      }
    });

    renderAll();
  </script>
</body>
</html>
