<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>중간고사 영어</title>
  <style>
    :root {
      --bg-top: #f4dfb8;
      --bg-bottom: #f7f2ea;
      --card: rgba(255, 252, 246, 0.9);
      --line: rgba(70, 48, 18, 0.08);
      --ink: #1f1a15;
      --muted: #6d655c;
      --brand: #c45b35;
      --brand-deep: #8e3f24;
      --accent: #2f6c63;
      --shadow: 0 28px 70px rgba(88, 55, 14, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(196, 91, 53, 0.18), transparent 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 56%, #f6efe4 100%);
    }

    .phone {
      width: min(100%, 430px);
      min-height: calc(100vh - 40px);
      border-radius: 38px;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,250,243,0.95));
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 36px 90px rgba(76, 48, 15, 0.22);
      position: relative;
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 122px;
      height: 24px;
      border-radius: 999px;
      background: rgba(46, 35, 22, 0.08);
    }

    .screen {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 56px 24px 28px;
      text-align: center;
      position: relative;
    }

    .screen::before,
    .screen::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .screen::before {
      width: 180px;
      height: 180px;
      background: rgba(196, 91, 53, 0.09);
      top: 72px;
      right: -60px;
    }

    .screen::after {
      width: 140px;
      height: 140px;
      background: rgba(47, 108, 99, 0.08);
      bottom: 110px;
      left: -46px;
    }

    .app-icon {
      width: 124px;
      height: 124px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, #d36c42 0%, #ea9f3a 55%, #f0cf79 100%);
      box-shadow:
        0 24px 45px rgba(196, 91, 53, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 28px;
    }

    .app-icon::before {
      content: "A";
      font-size: 58px;
      font-weight: 900;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.04em;
      transform: translateY(-2px);
    }

    .app-icon::after {
      content: "";
      position: absolute;
      width: 42px;
      height: 42px;
      right: 12px;
      bottom: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.14;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      max-width: 280px;
    }

    .card {
      width: 100%;
      margin-top: 28px;
      padding: 18px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: left;
    }

    .card-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .card-copy {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .start-btn {
      width: 100%;
      margin-top: 16px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 17px 18px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      color: white;
      background: linear-gradient(135deg, var(--brand-deep), var(--brand));
      box-shadow: 0 16px 32px rgba(196, 91, 53, 0.24);
    }

    .start-btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="screen">
      <div class="app-icon" aria-hidden="true"></div>
      <div class="eyebrow">English Study</div>
      <h1>중간고사 영어</h1>
      <p>4회차 단어 수업과 퀴즈를 한 화면에서 이어서 공부할 수 있어.</p>

      <div class="card">
        <div class="card-label">Start</div>
        <div class="card-title">학습 시작하기</div>
        <div class="card-copy">회차를 고르고, 수업을 본 뒤 바로 퀴즈까지 풀어 보자.</div>
        <a class="start-btn" href="midterm/data/school/08_인터랙티브_학습자료.html">들어가기</a>
      </div>
    </section>
  </main>
</body>
</html>
